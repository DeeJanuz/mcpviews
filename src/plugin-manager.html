<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCPViews - Plugin Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      background: #171717;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #737373;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover {
      color: #a3a3a3;
    }

    .tab.active {
      color: #e5e5e5;
      border-bottom-color: #6366f1;
    }

    /* Tab content */
    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .tab-content.active {
      display: block;
    }

    /* Registry grid */
    .registry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .plugin-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .plugin-card:hover {
      border-color: #3a3a3a;
    }

    .plugin-card .plugin-name {
      font-size: 14px;
      font-weight: 600;
      color: #f5f5f5;
    }

    .plugin-card .plugin-description {
      font-size: 12px;
      color: #737373;
      line-height: 1.5;
      flex: 1;
    }

    .plugin-card .plugin-version {
      font-size: 11px;
      color: #525252;
    }

    /* Buttons */
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #22c55e;
      color: #fff;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #e5e5e5;
    }

    .btn-muted {
      background: #1a1a1a;
      color: #525252;
      border: 1px solid #2a2a2a;
      cursor: default;
    }

    .btn-muted:hover {
      opacity: 1;
    }

    /* Installed list */
    .installed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .installed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .installed-row .plugin-info {
      flex: 1;
    }

    .installed-row .plugin-name {
      font-size: 14px;
      font-weight: 500;
      color: #f5f5f5;
    }

    .installed-row .plugin-meta {
      font-size: 11px;
      color: #525252;
      margin-top: 2px;
    }

    .installed-row .plugin-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .auth-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .auth-badge.configured {
      background: #052e16;
      color: #22c55e;
    }

    .auth-badge.not-configured {
      background: #451a03;
      color: #f59e0b;
    }

    .add-custom-row {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    /* Settings */
    .settings-section {
      max-width: 500px;
    }

    .settings-section label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a3a3a3;
      margin-bottom: 6px;
    }

    .settings-section input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .settings-section input[type="text"]:focus {
      border-color: #6366f1;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* Loading / empty */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #525252;
      font-size: 13px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #525252;
      font-size: 13px;
    }

    /* Error message */
    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 8px;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #f5f5f5;
      margin-bottom: 16px;
    }

    .modal-body p {
      font-size: 13px;
      color: #a3a3a3;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      padding: 8px 12px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-input:focus {
      border-color: #6366f1;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    /* Notification toast */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #052e16;
      color: #22c55e;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1001;
      transition: opacity 0.3s;
    }

    .notification-error {
      background: #450a0a;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <div class="tab active" data-tab="registry" onclick="switchTab('registry')">Registry</div>
    <div class="tab" data-tab="installed" onclick="switchTab('installed')">Installed</div>
    <div class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</div>
  </div>

  <div id="tab-registry" class="tab-content active">
    <div class="loading">Loading registry...</div>
  </div>

  <div id="tab-installed" class="tab-content">
    <div class="loading">Loading installed plugins...</div>
  </div>

  <div id="tab-settings" class="tab-content">
    <!-- Registry sources rendered dynamically by JS -->
  </div>

  <script src="./plugin-manager.js"></script>
</body>
</html>
