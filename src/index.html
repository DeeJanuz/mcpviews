<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Mux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <div id="main">
      <div id="main-header">
        <span id="main-title" class="title">MCP Mux</span>
        <div id="connection-status">
          <span id="connection-dot" class="dot connected"></span>
          <span id="connection-text">Ready</span>
        </div>
      </div>
      <div id="content-area">
        <div class="empty-state">Waiting for preview data...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid!=='undefined')mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose',suppressErrorRendering:true});</script>

  <!-- Renderers (same as companion, loaded as vanilla JS) -->
  <script src="./renderers/shared.js"></script>
  <script src="./renderers/document-preview.js"></script>
  <script src="./renderers/mermaid-renderer.js"></script>
  <script src="./renderers/rich-content.js"></script>
  <script src="./renderers/citation-panel.js"></script>

  <script src="./main.js"></script>
</body>
</html>
