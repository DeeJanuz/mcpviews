<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>MCPViews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="bg-pattern" aria-hidden="true"></div>
  <div id="app">
    <div id="main">
      <div id="main-header">
        <span id="main-title" class="title">MCPViews</span>
        <div id="connection-status">
          <span id="connection-dot" class="dot connected"></span>
          <span id="connection-text">Ready</span>
        </div>
        <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <span class="theme-icon-light">☀</span>
          <span class="theme-icon-dark">☾</span>
        </button>
      </div>
      <div id="tab-bar"></div>
      <div id="content-area"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid!=='undefined')mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose',suppressErrorRendering:true});</script>

  <script>
(function() {
  var html = document.documentElement;
  var saved = localStorage.getItem('mcpviews-theme');
  if (saved) {
    html.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.setAttribute('data-theme', 'dark');
  }

  function syncNativeTheme(theme) {
    if (window.__TAURI_INTERNALS__) {
      window.__TAURI_INTERNALS__.invoke('set_native_theme', { theme: theme }).catch(function() {});
    }
  }

  // Sync native window theme on initial load
  syncNativeTheme(html.getAttribute('data-theme') || 'light');

  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('mcpviews-theme', next);
        syncNativeTheme(next);
        if (typeof mermaid !== 'undefined') {
          mermaid.initialize({ startOnLoad: false, theme: next === 'dark' ? 'dark' : 'default', securityLevel: 'loose', suppressErrorRendering: true });
        }
        if (window.__companionUtils && window.__companionUtils.reRenderMermaid) {
          window.__companionUtils.reRenderMermaid();
        }
      });
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('mcpviews-theme')) {
          var theme = e.matches ? 'dark' : 'light';
          html.setAttribute('data-theme', theme);
          syncNativeTheme(theme);
          if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: theme === 'dark' ? 'dark' : 'default', securityLevel: 'loose', suppressErrorRendering: true });
          }
          if (window.__companionUtils && window.__companionUtils.reRenderMermaid) {
            window.__companionUtils.reRenderMermaid();
          }
        }
      });
    }
  });
})();
</script>

  <!-- Renderers (same as companion, loaded as vanilla JS) -->
  <script src="./renderers/shared.js"></script>
  <script src="./renderers/document-preview.js"></script>
  <script src="./renderers/mermaid-renderer.js"></script>
  <script src="./renderers/rich-content.js"></script>
  <script src="./renderers/structured-data-utils.js"></script>
  <script src="./renderers/structured-data.js"></script>
  <script src="./renderers/citation-panel.js"></script>
  <script src="./renderers/drawer-stack.js"></script>
  <script src="./renderers/invocation-registry.js"></script>

  <script src="./main.js"></script>
</body>
</html>
