<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Window frame with rounded corners -->
  <rect x="12" y="20" width="104" height="92" rx="10" ry="10" fill="none" stroke="#000" stroke-width="6"/>
  <!-- Title bar -->
  <line x1="12" y1="42" x2="116" y2="42" stroke="#000" stroke-width="4"/>
  <!-- Title bar dots -->
  <circle cx="28" cy="31" r="4" fill="#000"/>
  <circle cx="42" cy="31" r="4" fill="#000"/>
  <circle cx="56" cy="31" r="4" fill="#000"/>
  <!-- Agent network nodes inside window -->
  <circle cx="48" cy="68" r="8" fill="#000"/>
  <circle cx="80" cy="60" r="8" fill="#000"/>
  <circle cx="64" cy="90" r="8" fill="#000"/>
  <!-- Connections between nodes -->
  <line x1="48" y1="68" x2="80" y2="60" stroke="#000" stroke-width="3"/>
  <line x1="80" y1="60" x2="64" y2="90" stroke="#000" stroke-width="3"/>
  <line x1="64" y1="90" x2="48" y2="68" stroke="#000" stroke-width="3"/>
</svg>
