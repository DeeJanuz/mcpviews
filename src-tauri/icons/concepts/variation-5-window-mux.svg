<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Window frame -->
  <rect x="12" y="20" width="104" height="92" rx="10" ry="10" fill="none" stroke="#000" stroke-width="6"/>
  <!-- Title bar -->
  <line x1="12" y1="42" x2="116" y2="42" stroke="#000" stroke-width="4"/>
  <!-- Title bar dots -->
  <circle cx="28" cy="31" r="4" fill="#000"/>
  <circle cx="42" cy="31" r="4" fill="#000"/>
  <circle cx="56" cy="31" r="4" fill="#000"/>
  <!-- Multiple input streams converging to one output (mux concept) -->
  <!-- Input nodes on left -->
  <circle cx="32" cy="56" r="5" fill="#000"/>
  <circle cx="32" cy="73" r="5" fill="#000"/>
  <circle cx="32" cy="90" r="5" fill="#000"/>
  <!-- Central hub -->
  <circle cx="64" cy="73" r="10" fill="#000"/>
  <!-- Output on right -->
  <circle cx="96" cy="73" r="5" fill="#000"/>
  <!-- Connection lines -->
  <line x1="37" y1="56" x2="54" y2="73" stroke="#000" stroke-width="3"/>
  <line x1="37" y1="73" x2="54" y2="73" stroke="#000" stroke-width="3"/>
  <line x1="37" y1="90" x2="54" y2="73" stroke="#000" stroke-width="3"/>
  <line x1="74" y1="73" x2="91" y2="73" stroke="#000" stroke-width="3"/>
  <!-- Sparkle on hub -->
  <circle cx="64" cy="73" r="3" fill="#fff"/>
</svg>
